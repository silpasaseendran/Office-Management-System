<!DOCTYPE html>
<html>
<head>

<style>

body{
    font-family: Arial;
    padding:10px;
}

h2{
    text-align:center;
}

/* 🔥 Responsive wrapper */
.table-box{
    width:100%;
    overflow-x:auto;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    min-width:600px; /* important */
}

th,td{
    border:1px solid black;
    padding:6px;
    text-align:center;
}

/* Header */
th{
    background:#ccd9e7;
    color:rgb(18, 17, 17);
}

/* Total rows */
.total{
    font-weight:bold;
    background:#f2f2f2;
}
.back-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
}

.back-btn:hover{
    background:#1e40af;
}

</style>

</head>

<body>
    <button onclick="history.back()" class="back-btn">
    ← Back
</button>

<h2>OFFICE EXPENSE REPORT</h2>

<div class="table-box">

<table>

<tr>
<th width="8%">SL NO</th>
<th>ITEM</th>
<th>DEPARTMENT</th>
<th width="10%">AMOUNT</th>
<th>REMARK</th>
</tr>

{% for e in expenses %}

<tr>
<td>{{ e.sl_no }}</td>
<td>{{ e.item }}</td>
<td>{{ e.department }}</td>
<td>{{ e.amount }}</td>
<td>{{ e.remark }}</td>
</tr>

{% endfor %}

<tr class="total">
<td colspan="3">TOTAL</td>
<td colspan="2">{{ total }}</td>
</tr>

<tr>
<td colspan="3"><b>PAID</b></td>
<td colspan="2">{{ paid }}</td>
</tr>

<tr>
<td colspan="3"><b>BALANCE</b></td>
<td colspan="2">{{ balance }}</td>
</tr>

</table>

</div>

</body>
</html>
