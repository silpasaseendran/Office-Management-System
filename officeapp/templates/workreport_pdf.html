<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
    font-family: Arial;
    font-size: 12px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
}

/* CELLS */
th, td{
    border:1px solid black;
    padding:6px;
    text-align:center;
    vertical-align: top;
}

/* HEADER */
th{
    background:#d3e2f2;
}

/* FORCE TEXT BREAK */
.wrap{
    word-break: break-all;
}

/* TITLE */
.title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}
.back-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
}

.back-btn:hover{
    background:#1e40af;
}

</style>

</head>

<body>
    <button onclick="history.back()" class="back-btn">
    ← Back
</button>

<div class="title">
    DAILY LABOUR REPORT
</div>

<table>

<tr>
<th width="8%">SL NO</th>
<th width="38%">SITE</th>
<th width="38%">LABOUR TYPE</th>
<th width="10%">NOS</th>
<th width="38%">REMARKS</th>
</tr>

{% for key, rows in reports.items %}

    {% for r in rows %}
    <tr style="page-break-inside: avoid;">

        {% if forloop.first %}
        <td rowspan="{{ rows|length }}">
            {{ key.0 }}
        </td>

        <td rowspan="{{ rows|length }}" class="wrap">
            <pdf:wordWrap>
                {{ key.1 }}
            </pdf:wordWrap>
        </td>
        {% endif %}

        <td class="wrap">
            <pdf:wordWrap>
                {{ r.labour_type }}
            </pdf:wordWrap>
        </td>

        <td>
            {{ r.nos }}
        </td>

        <td class="wrap" style="text-align:left;">
            <pdf:wordWrap>
                {{ r.remarks }}
            </pdf:wordWrap>
        </td>

    </tr>
    {% endfor %}

{% endfor %}

</table>

</body>
</html>
