<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

{% load static %}
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
 <script src="{% static 'js/bootstrap.min.js' %}"></script>

<style>
body {
    min-height: 100vh;
    background: linear-gradient(120deg, #93c572, #e6c200);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.register-card {
    max-width: 850px;
    width: 100%;
    min-height: 450px;
    display: flex;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
}

/* Left */
.left {
    width: 50%;
    background: linear-gradient(180deg, #7fbf7f, #d4af37);
    color: #2f4f2f;
    padding: 40px;
}

/* Right */
.right {
    width: 50%;
    padding: 40px;
}

/* Button */
.btn-gold {
    background-color: #d4af37;
    border: none;
    color: #2f4f2f;
    font-weight: bold;
}

.btn-gold:hover {
    background-color: #c9a227;
}

/* 🔥 RESPONSIVE */
@media (max-width: 768px) {

    .register-card {
        flex-direction: column;
        max-width: 400px;
    }

    .left {
        display: none; /* hide left on mobile */
    }

    .right {
        width: 100%;
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="register-card">

    <!-- LEFT -->
    <div class="left">
        <h2>Create Account</h2>
        <p class="mt-4">
            Register to access the Office Management System.
            Manage employees and records securely.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h3 class="text-center mb-4">Register</h3>

        <form method="post">
            {% csrf_token %}

            <input class="form-control mb-3" name="username" placeholder="Username" required>
            <input class="form-control mb-3" name="email" placeholder="Email" required>

            <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
            <input class="form-control mb-4" type="password" name="confirm" placeholder="Confirm Password" required>

            <button class="btn btn-gold w-100">Create Account</button>
        </form>

        <p class="text-center mt-3">
            Already registered? <a href="/">Login</a>
        </p>
    </div>

</div>

</body>
</html>
