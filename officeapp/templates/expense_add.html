<!DOCTYPE html>
<html>
<head>

<title>Expense Add</title>

{% load static %}
<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
 <script src="{% static 'js/bootstrap.min.js' %}"></script>

<style>

body{
    background:#f4f6f9;
}

/* Container */
.container-box{
    max-width:900px;
    width:100%;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 8px rgba(0,0,0,0.1);
}

/* Table responsive */
.table-responsive{
    overflow-x:auto;
}

/* Inputs */
input{
    width:100%;
    padding:8px;
    border:1px solid #ccc;
    border-radius:5px;
}

/* Buttons */
.btn-custom{
    margin:5px 5px 5px 0;
}

.custom-head th {
    background-color: #0f5d7b !important; /* blue */
    color: white !important;
}

</style>

</head>

<body>

<div class="container-box">

<h2 class="text-center mb-3">OFFICE EXPENSE ADD</h2>

<form method="POST">
{% csrf_token %}

<div class="table-responsive">
<table class="table table-bordered text-center" id="expenseTable">

<tr class="custom-head">
<th>SL NO</th>
<th>ITEMS</th>
<th>DEPARTMENT</th>
<th>AMOUNT</th>
<th>REMARK</th>
</tr>

<tr>
<td><input type="number" name="sl_no[]"></td>
<td><input type="text" name="item[]"></td>
<td><input type="text" name="department[]"></td>
<td><input type="number" step="0.01" name="amount[]"></td>
<td><input type="text" name="remark[]"></td>
</tr>

</table>
</div>

<!-- Paid Amount -->
<div class="mt-3">
    <label class="fw-bold">Paid Amount :</label>
    <input type="number" name="paid" step="0.01" required>
</div>

<!-- Buttons -->
<div class="mt-3">
    <button type="button" class="btn btn-primary btn-custom" onclick="addRow()">
        Add Row
    </button>

    <button type="submit" class="btn btn-success btn-custom">
        Save Expense
    </button>
</div>

</form>

</div>

<script>

function addRow(){

let table=document.getElementById("expenseTable");

let row=table.insertRow(-1);

row.innerHTML=`
<td><input type="number" name="sl_no[]"></td>
<td><input type="text" name="item[]"></td>
<td><input type="text" name="department[]"></td>
<td><input type="number" step="0.01" name="amount[]"></td>
<td><input type="text" name="remark[]"></td>
`;

}

</script>

</body>
</html>
