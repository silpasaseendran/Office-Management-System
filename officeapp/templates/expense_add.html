<!DOCTYPE html>
<html>
<head>

<title>Expense Add</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

.container{
width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:6px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

input{
width:100%;
padding:5px;
border:1px solid #ccc;
}

button{
padding:8px 14px;
border:none;
border-radius:4px;
cursor:pointer;
}

.addbtn{
background:#3498db;
color:white;
}

.savebtn{
background:#27ae60;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>OFFICE EXPENSE ADD</h2>

<form method="POST">
{% csrf_token %}

<table id="expenseTable">

<tr>
<th>SL NO</th>
<th>ITEMS</th>
<th>DEPARTMENT</th>
<th>AMOUNT</th>
<th>REMARK</th>
</tr>

<tr>
<td><input type="number" name="sl_no[]"></td>
<td><input type="text" name="item[]"></td>
<td><input type="text" name="department[]"></td>
<td><input type="number" step="0.01" name="amount[]"></td>
<td><input type="text" name="remark[]"></td>
</tr>

</table>

<br><br>

<label><b></b>Paid Amount :</b></label>

<input type="number" name="paid" step="0.01" required>

<br><br>

<button type="button" class="addbtn" onclick="addRow()">Add Row</button>

<button type="submit" class="savebtn">Save Expense</button>

</form>

</div>

<script>

function addRow(){

let table=document.getElementById("expenseTable");

let row=table.insertRow(-1);

row.innerHTML=`

<td><input type="number" name="sl_no[]"></td>
<td><input type="text" name="item[]"></td>
<td><input type="text" name="department[]"></td>
<td><input type="number" step="0.01" name="amount[]"></td>
<td><input type="text" name="remark[]"></td>

`;

}

</script>

</body>
</html>
