<!DOCTYPE html>
<html>
<head>
<title>Attendance</title>

{% load static %}

<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
 <script src="{% static 'js/bootstrap.min.js' %}"></script>

<style>
body{
    background:#f4f6f9;
}

/* Mobile scroll for table */
.table-responsive{
    overflow-x:auto;
}
.back-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
}

.back-btn:hover{
    background:#1e40af;
}
</style>
</head>

<body>


<div class="container mt-4">
    <button onclick="history.back()" class="back-btn">
    ← Back
</button>

<h2 class="mb-4 text-center">Employee Attendance</h2>

<form method="POST">
{% csrf_token %}

<div class="table-responsive">
<table class="table table-bordered text-center">

<tr class="table-primary">
    <td>
        <select name="employee" class="form-control">
            {% for emp in employees %}
            <option value="{{ emp.id }}">{{ emp.name }}</option>
            {% endfor %}
        </select>
    </td>

    <td><input type="date" id="dateField" name="date" class="form-control" required></td>

    <td><input type="time" name="time_in" class="form-control" required></td>

    <td><input type="time" name="time_out" class="form-control" required></td>

    <td>
        <select name="status" class="form-control">
            <option>Present</option>
            <option>Absent</option>
        </select>
    </td>

    <td>
        <button type="submit" class="btn btn-primary w-100">Save</button>
    </td>
</tr>

</table>
</div>

</form>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById("dateField").value = today;
</script>

<div class="table-responsive mt-4">
<table class="table table-bordered table-striped text-center">

<thead class="table-dark">
<tr>
    <th>Name</th>
    <th>Date</th>
    <th>Time In</th>
    <th>Time Out</th>
    <th>Status</th>
</tr>
</thead>

<tbody>
{% for att in attendance_list %}
<tr>
    <td>{{ att.employee.name }}</td>
    <td>{{ att.date }}</td>
    <td>{{ att.time_in }}</td>
    <td>{{ att.time_out }}</td>
    <td>{{ att.status }}</td>
</tr>
{% empty %}
<tr>
<td colspan="5">No records</td>
</tr>
{% endfor %}
</tbody>

</table>
</div>

</div>

</body>
</html>
