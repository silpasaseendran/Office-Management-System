<!DOCTYPE html>
<html>
<head>
    <title>Employees List</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>
        body {
            background: #f4f6f9;
        }

        thead {
    background-color: #1a5595 !important;
    color: white !important;
}
    </style>
</head>
<body>

<div class="container mt-4">

<h2 class="text-center mb-4">All Employees</h2>

<div class="table-responsive">
<table class="table table-bordered table-striped text-center">

<thead>
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Department</th>
    <th>Position</th>
    <th>Joined Date</th>
</tr>
</thead>

<tbody>
{% for emp in employees %}
<tr>
    <td>{{ emp.name }}</td>
    <td>{{ emp.email }}</td>
    <td>{{ emp.phone }}</td>
    <td>{{ emp.department }}</td>
    <td>{{ emp.position }}</td>
    <td>{{ emp.joined_date }}</td>
</tr>
{% empty %}
<tr>
<td colspan="6">No employees found</td>
</tr>
{% endfor %}
</tbody>

</table>
</div>

</div>

</body>
</html>
